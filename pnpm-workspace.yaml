packages:
  - 'apps/*'
  - 'packages/*'

# Single source of truth for dependency versions across the monorepo.
# Packages reference these with `"dep": "catalog:"` so every app/package
# stays on the exact same version. Bump here, install once, done.
catalog:
  # --- Framework ---
  next: ^16.2.6
  react: ^19.2.6
  react-dom: ^19.2.6

  # --- Language & types ---
  typescript: ^6.0.0
  '@types/node': ^24.0.0
  '@types/react': ^19.2.15
  '@types/react-dom': ^19.2.3

  # --- Styling & UI ---
  tailwindcss: ^4.3.0
  '@tailwindcss/postcss': ^4.3.0
  motion: ^12.40.0
  clsx: ^2.1.1
  tailwind-merge: ^3.3.1
  geist: ^1.5.1

  # --- Validation & domain ---
  zod: ^4.4.3

  # --- Data layer ---
  '@supabase/supabase-js': ^2.106.2
  '@supabase/ssr': ^0.10.3
  '@tanstack/react-query': ^5.100.14
  '@tanstack/react-query-persist-client': ^5.100.14
  zustand: ^5.0.14
  react-hook-form: ^7.76.1
  '@hookform/resolvers': ^5.4.0

  # --- Maps ---
  leaflet: ^1.9.4
  react-leaflet: ^5.0.0
  '@types/leaflet': ^1.9.20
  leaflet-draw: ^1.0.4
  '@types/leaflet-draw': ^1.0.13

  # --- Async / infra ---
  inngest: ^4.5.0
  '@upstash/ratelimit': ^2.0.8
  '@upstash/redis': ^1.38.0
  web-push: ^3.6.7
  '@types/web-push': ^3.6.4

  # --- Tooling ---
  '@biomejs/biome': ^2.4.16
  vitest: ^4.1.7
  turbo: ^2.9.16
